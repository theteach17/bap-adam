<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - ศูนย์สารสนเทศกลาง KIC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Chakra Petch', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://img2.pic.in.th/pic/IMG_20180917_092641.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    /* Overlay สีแดง-เหลือง จางๆ */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 118, 117, 0.85), rgba(253, 203, 110, 0.85)); 
      z-index: 1;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      padding: 45px 40px;
      text-align: center;
      border-top: 5px solid #d63031; /* แถบสีแดงด้านบน */
    }

    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 15px;
      padding: 5px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #d63031; /* สีแดงเข้ม */
      margin-bottom: 5px;
    }
    
    .subtitle {
        color: #e17055; /* สีส้มแดง */
        font-size: 0.9rem;
        margin-bottom: 30px;
        font-weight: 500;
    }

    .form-control {
      background-color: #fff;
      border: 2px solid #ffeaa7; /* ขอบสีเหลืองพาสเทล */
      border-radius: 12px;
      padding: 12px 15px;
      margin-bottom: 15px;
      font-size: 1rem;
      color: #636e72;
    }

    .form-control:focus {
      background-color: #fff;
      border-color: #ff7675; /* Focus สีแดงพาสเทล */
      box-shadow: 0 0 0 4px rgba(255, 118, 117, 0.2);
      color: #2d3436;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, #d63031, #ff7675); /* Gradient แดง */
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 15px;
      box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3);
    }

    .btn-login:hover {
      background: linear-gradient(45deg, #c0392b, #e17055);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(214, 48, 49, 0.4);
    }

    .footer-text {
      margin-top: 25px;
      font-size: 0.75rem;
      color: #b2bec3;
      border-top: 1px solid #dfe6e9;
      padding-top: 15px;
    }
    
    label {
        font-weight: 600;
        color: #636e72;
        margin-bottom: 6px;
        text-align: left;
        display: block;
        font-size: 0.9rem;
    }
    
    .input-icon {
        position: relative;
    }
    
    .input-icon i {
        position: absolute;
        right: 15px;
        top: 42px;
        color: #fab1a0;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <img src="https://img2.pic.in.th/pic/logofd3322a65d133ac4.png" alt="Logo" class="logo-img">
    <h1>ศูนย์สารสนเทศกลาง KIC</h1>
    <p class="subtitle">โรงเรียนแกลง "วิทยสถาวร"</p>
    
    <form id="login-form">
      <div class="text-start input-icon">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="ชื่อผู้ใช้งาน" pattern="[a-zA-Z0-9]+" required>
        <i class="fas fa-user"></i>
      </div>
      
      <div class="text-start input-icon">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="รหัสผ่าน" pattern="[a-zA-Z0-9]+" required>
        <i class="fas fa-lock"></i>
      </div>

      <button type="button" class="btn-login" onclick="validateLogin()">
        <i class="fas fa-sign-in-alt me-2"></i> เข้าสู่ระบบ
      </button>
    </form>

    <div class="footer-text">
      <p>v.2.0.0 พัฒนาโดย งานแผนงานและสารสนเทศโรงเรียน</p>
    </div>
  </div>

<script>
    // =========================================================================
    // [NEW] เพิ่มระบบดักจับการกดปุ่ม Enter ภายในฟอร์ม
    // =========================================================================
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('login-form').addEventListener('keypress', function(e) {
        // ตรวจสอบว่าปุ่มที่กดคือปุ่ม Enter หรือไม่
        if (e.key === 'Enter') {
          e.preventDefault(); // ป้องกันไม่ให้เบราว์เซอร์รีเฟรชหน้าเว็บ
          validateLogin();    // เรียกใช้งานฟังก์ชันตรวจสอบการล็อกอินทันที
        }
      });
    });

    // =========================================================================
    // ฟังก์ชันตรวจสอบการเข้าสู่ระบบ (โค้ดเดิมครบทุกบรรทัด ไม่มีการตัดทอน)
    // =========================================================================
    function validateLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      Swal.fire({
        title: 'กำลังตรวจสอบข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      google.script.run.withSuccessHandler(function(response) {
        Swal.close();
        if (response.success) {
          Swal.fire({
            icon: 'success',
            title: `ยินดีต้อนรับคุณ ${response.name}`,
            text: 'คลิกปุ่มด้านล่างเพื่อเข้าสู่หน้าหลัก KIC',
            showConfirmButton: true,
            confirmButtonText: 'เข้าสู่หน้าหลัก',
            confirmButtonColor: '#d63031',
            timer: null 
          }).then((result) => {
            if (result.isConfirmed) { 
                // ดึง URL แบบ Dynamic จากเซิร์ฟเวอร์
                google.script.run.withSuccessHandler(function(url) {
                    window.open(`${url}?page=Index&name=${encodeURIComponent(response.name)}`, '_top');
                }).getWebAppUrl();
            }
          });
        } else {
          Swal.fire({
            icon: 'error',
            title: 'เข้าสู่ระบบไม่สำเร็จ',
            text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง',
            confirmButtonColor: '#d63031'
          });
          document.getElementById('login-form').reset();
        }
      }).checkLogin(username, password);
    }
  </script>
</body>
</html>
